name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']

    name: Java ${{ matrix.java }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout flametrench/ids-java
        uses: actions/checkout@v4
        with:
          repository: flametrench/ids-java
          ref: v0.4.0
          path: _vendored/ids-java

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Install ids dep to local Maven repo
        run: mvn -B -f _vendored/ids-java/pom.xml install -DskipTests

      - name: Run tests
        run: mvn -B test
